<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon</title>
    <link rel="stylesheet" href="../Amazon Page/assets/css/reset.css" />
    <link rel="stylesheet" href="../Amazon Page/assets/css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <!-- LOGO -->
      <div>
        <img src="../Amazon Page/assets/images/logo.png" alt="Logo Amazon" />
      </div>
      <!-- MENù -->
      <nav>
        <a href="#">All</a>
        <a href="#">Today's deals</a>
        <a href="#">Customer Service</a>
        <a href="#">Registry</a>
        <a href="#">Gift Cards</a>
        <a href="#">Sell</a>
      </nav>
    </header>
    <!-- MAIN -->
    <main>
      <!-- PRIMO BLOCCO ARANCIONE -->
      <div id="bg-orange">
        <p class="text-center">Shop All Holiday Gift Cards</p>
      </div>
      <!-- SECONDO BLOCCO VERDE -->
      <section id="secondo-blocco">
        <div id="bg-hgg">
          <div id="testi" class="text-center">
            <h1>Holiday Gift Guides</h1>
            <h2>Be a go-gifter</h2>
          </div>
        </div>
      </section>
      <!-- TERZO BLOCCO -->
      <section id="terzo-blocco" class="mar-top">
        <div id="testi-terzo-blocco">
          <h2>Find the perfect gift</h2>
          <a href="#">Shop now</a>
        </div>
        <div id="immagini" class="text-center">
          <img src="../Amazon Page/assets/images/img_1.jpg" alt="" />
          <img src="../Amazon Page/assets/images/img_2.jpg" alt="" />
          <img src="../Amazon Page/assets/images/img_3.jpg" alt="" />
          <img src="../Amazon Page/assets/images/img_4.jpg" alt="" />
        </div>
      </section>
      <!-- QUARTO BLOCCO -->
      <section id="quarto-blocco" class="mar-top">
        <div>
          <img src="../Amazon Page/assets/images/img_9.png" alt="" />
        </div>
        <div id="testi-quarto-blocco" class="text-center">
          <h2>Play the gifting game</h2>
          <a href="#">Shop gaming</a>
        </div>
      </section>
      <!-- QUINTO BLOCCO -->
      <section id="quinto-blocco" class="mar-top">
        <div>
          <img src="../Amazon Page/assets/images/img_10.png" alt="" />
        </div>
        <div id="testi-quinto-blocco" class="text-center">
          <h2>The sound of cheer</h2>
          <a href="#">Shop Audio & Accessories</a>
        </div>
      </section>
      <!-- SESTO BLOCCO -->
    </main>
    <footer>
      <section class="text-center" id="back-top">
        <a href="#">Back to top</a>
      </section>
      <section id="logo-footer" class="text-center">
        <img src="../Amazon Page/assets/images/logo.png" alt="Logo Amazon" />
      </section>
    </footer>
  </body>
</html>
